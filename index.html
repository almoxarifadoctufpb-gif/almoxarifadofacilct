<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A4B8C">
    <title>Almox Fácil CT - Catálogo</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        :root {
            --azul-institucional: #0A4B8C;
            --azul-escuro: #083A6E;
            --azul-claro: #E6F0FA;
            --branco: #FFFFFF;
            --cinza-claro: #F5F7FA;
            --cinza-borda: #E1E5EA;
            --texto-principal: #2C3E50;
            --texto-secundario: #7F8C8D;
            --verde: #27AE60;
            --amarelo: #F39C12;
            --vermelho: #E74C3C;
        }

        body {
            background-color: var(--cinza-claro);
            color: var(--texto-principal);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--azul-institucional), var(--azul-escuro));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            transition: opacity 0.5s;
        }

        #splash-screen img {
            width: 150px;
            height: 150px;
            border-radius: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: white;
            padding: 10px;
            object-fit: contain;
            border: 4px solid rgba(255,255,255,0.3);
        }

        #splash-screen span {
            font-size: 26px;
            font-weight: 300;
            letter-spacing: 2px;
            background: rgba(255,255,255,0.15);
            padding: 10px 30px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }

        /* Container Principal */
        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--branco);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--azul-institucional), var(--azul-escuro));
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            box-shadow: 0 4px 15px rgba(10,75,140,0.3);
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo img {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: white;
            padding: 5px;
            object-fit: contain;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .header-title h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .header-title p {
            font-size: 11px;
            opacity: 0.9;
        }

        .header-icons button {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            cursor: pointer;
        }

        /* Tela de Login */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--azul-institucional), var(--azul-escuro));
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .login-box {
            background: var(--branco);
            width: 90%;
            max-width: 400px;
            padding: 35px 25px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-box .logo-container img {
            width: 150px;
            height: 150px;
            border-radius: 30px;
            background: white;
            padding: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            border: 4px solid var(--azul-institucional);
            object-fit: contain;
        }

        .login-box h2 {
            color: var(--azul-institucional);
            margin-bottom: 5px;
            font-size: 26px;
        }

        .login-box p {
            color: var(--texto-secundario);
            margin-bottom: 25px;
            font-size: 15px;
        }

        .login-box .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .login-box .form-group input {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid var(--cinza-borda);
            border-radius: 15px;
            font-size: 15px;
            outline: none;
        }

        .login-box button {
            width: 100%;
            padding: 15px;
            background: var(--azul-institucional);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
            cursor: pointer;
        }

        .login-footer {
            margin-top: 20px;
            font-size: 12px;
            color: var(--texto-secundario);
        }

        /* Navegação Inferior */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            max-width: 500px;
            width: 100%;
            background: var(--branco);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            border-top: 1px solid var(--cinza-borda);
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.03);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--texto-secundario);
            font-size: 11px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 12px;
        }

        .nav-item.active {
            color: var(--azul-institucional);
            background: var(--azul-claro);
        }

        .nav-item span {
            font-size: 18px;
        }

        /* Conteúdo Principal */
        .main-content {
            padding: 20px;
            padding-bottom: 80px;
        }

        /* Catálogo em Grid */
        .catalog-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .product-card {
            background: var(--branco);
            border: 1px solid var(--cinza-borda);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
        }

        .product-image {
            height: 120px;
            background: var(--azul-claro);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: var(--azul-institucional);
        }

        .product-info {
            padding: 12px;
        }

        .product-info h4 {
            font-size: 16px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-category {
            font-size: 11px;
            color: var(--texto-secundario);
            margin-bottom: 6px;
        }

        .product-desc {
            font-size: 12px;
            color: var(--texto-principal);
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-stock {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .stock-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .stock-badge.normal { background: #E8F5E9; color: var(--verde); }
        .stock-badge.low { background: #FFF3E0; color: var(--amarelo); }
        .stock-badge.zero { background: #FFEBEE; color: var(--vermelho); }

        .product-qty {
            font-weight: 600;
            font-size: 14px;
        }

        .btn-solicitar {
            width: 100%;
            padding: 10px;
            background: var(--azul-institucional);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        /* Lista de Solicitações */
        .request-card {
            background: var(--branco);
            border: 1px solid var(--cinza-borda);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .request-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .request-status {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-pending { background: #FFF3E0; color: var(--amarelo); }
        .status-approved { background: #E8F5E9; color: var(--verde); }
        .status-rejected { background: #FFEBEE; color: var(--vermelho); }

        .request-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        /* Cards do Dashboard */
        .dashboard-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--branco);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid var(--cinza-borda);
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: var(--azul-institucional);
            margin-bottom: 5px;
        }

        .stat-card .label {
            font-size: 13px;
            color: var(--texto-secundario);
        }

        /* Ações Rápidas */
        .quick-actions {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0 20px;
        }

        .quick-actions::-webkit-scrollbar { display: none; }

        .action-btn {
            background: var(--branco);
            border: 1px solid var(--cinza-borda);
            padding: 12px 20px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            font-size: 14px;
            cursor: pointer;
        }

        .action-btn.primary {
            background: var(--azul-institucional);
            color: white;
            border: none;
        }

        /* Modais */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--branco);
            width: 90%;
            max-width: 450px;
            border-radius: 25px;
            overflow: hidden;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 20px;
            background: var(--azul-institucional);
            color: white;
            font-weight: 600;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-header img {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: white;
            padding: 4px;
            object-fit: contain;
        }

        .modal-body { padding: 20px; max-height: 60vh; overflow-y: auto; }
        .modal-footer { padding: 15px 20px; border-top: 1px solid var(--cinza-borda); display: flex; justify-content: flex-end; gap: 10px; }

        /* Formulários */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--texto-secundario); margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--cinza-borda);
            border-radius: 12px;
            font-size: 15px;
            outline: none;
        }

        /* Botões */
        .btn { padding: 12px 24px; border: none; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; }
        .btn-primary { background: var(--azul-institucional); color: white; }
        .btn-secondary { background: var(--cinza-claro); color: var(--texto-principal); }
        .btn-danger { background: var(--vermelho); color: white; }
        .btn-success { background: var(--verde); color: white; }
    </style>
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash-screen">
        <img src="icon.png" alt="Almox Fácil CT" id="splash-logo">
        <span>Almox Fácil CT</span>
    </div>

    <!-- Tela de Login -->
    <div id="login-screen">
        <div class="login-box">
            <div class="logo-container">
                <img src="icon.png" alt="Almox Fácil CT" id="login-logo"
                     onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%230A4B8C%22/><text x=%2250%22 y=%2265%22 font-size=%2240%22 text-anchor=%22middle%22 fill=%22white%22>CT</text></svg>';">
            </div>
            <h2>Almox Fácil CT</h2>
            <p>Centro de Tecnologia - UFPB</p>
            <div class="form-group">
                <label>E-mail institucional</label>
                <input type="email" id="login-email" placeholder="usuario@ct.ufpb.br" value="admin@ufpb.br">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="login-password" placeholder="******" value="123456">
            </div>
            <button onclick="app.login()">Entrar</button>
            <div class="login-footer">
                <p>👑 admin@ufpb.br / 123456 • 👤 usuario@ufpb.br / 123456</p>
            </div>
        </div>
    </div>

    <!-- App Container -->
    <div class="app-container" id="app-container" style="display: none;">
        <!-- Header -->
        <div class="header">
            <div class="header-logo">
                <img src="icon.png" alt="Logo" id="header-logo">
                <div class="header-title">
                    <h1>Almox Fácil CT</h1>
                    <p id="user-greeting">Carregando...</p>
                </div>
            </div>
            <div class="header-icons">
                <button onclick="app.logout()">🚪</button>
            </div>
        </div>

        <!-- Conteúdo Principal -->
        <div class="main-content" id="main-content"></div>

        <!-- Navegação Inferior -->
        <nav class="bottom-nav" id="bottom-nav"></nav>
    </div>

    <!-- MODAIS -->

    <!-- Modal de Solicitação de Material -->
    <div class="modal-overlay" id="modal-solicitar">
        <div class="modal">
            <div class="modal-header">
                <img src="icon.png" alt="">
                Solicitar Material
            </div>
            <div class="modal-body">
                <input type="hidden" id="solicitar-produto-id">
                <p><strong id="solicitar-produto-nome"></strong></p>
                <p>Estoque disponível: <span id="solicitar-estoque-disponivel">0</span></p>
                <div class="form-group">
                    <label>Quantidade</label>
                    <input type="number" id="solicitar-qtd" min="1" value="1">
                </div>
                <div class="form-group">
                    <label>Setor solicitante</label>
                    <input type="text" id="solicitar-setor" placeholder="Seu setor">
                </div>
                <div class="form-group">
                    <label>Observação (opcional)</label>
                    <textarea id="solicitar-obs" rows="2" placeholder="Ex: urgente"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="app.closeModal('modal-solicitar')">Cancelar</button>
                <button class="btn btn-primary" onclick="app.enviarSolicitacao()">Solicitar</button>
            </div>
        </div>
    </div>

    <!-- Modal de Cadastro/Edição de Produto (Admin) -->
    <div class="modal-overlay" id="modal-produto">
        <div class="modal">
            <div class="modal-header">
                <img src="icon.png" alt="">
                <span id="modal-produto-titulo">Novo Produto</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="produto-id">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" id="produto-nome">
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="produto-descricao" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <select id="produto-categoria"></select>
                </div>
                <div class="form-group">
                    <label>Unidade de medida</label>
                    <input type="text" id="produto-unidade" placeholder="ex: unidade, resma, caixa">
                </div>
                <div class="form-group">
                    <label>Estoque atual</label>
                    <input type="number" id="produto-estoque" min="0" value="0">
                </div>
                <div class="form-group">
                    <label>Estoque mínimo</label>
                    <input type="number" id="produto-min" min="0" value="5">
                </div>
                <div class="form-group">
                    <label>Localização</label>
                    <input type="text" id="produto-localizacao" placeholder="Ex: Prateleira A1">
                </div>
                <div class="form-group">
                    <label>Valor unitário (R$)</label>
                    <input type="number" id="produto-valor" step="0.01" min="0" value="0.00">
                </div>
                <div class="form-group">
                    <label>Ícone (emoji)</label>
                    <input type="text" id="produto-emoji" placeholder="ex: 📄" value="📦">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="app.closeModal('modal-produto')">Cancelar</button>
                <button class="btn btn-primary" onclick="app.salvarProduto()">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Modal de Gerenciar Solicitações (Admin) -->
    <div class="modal-overlay" id="modal-gerir-solicitacoes">
        <div class="modal">
            <div class="modal-header">
                <img src="icon.png" alt="">
                Solicitações Pendentes
            </div>
            <div class="modal-body" id="lista-solicitacoes-pendentes">
                <!-- preenchido via js -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="app.closeModal('modal-gerir-solicitacoes')">Fechar</button>
            </div>
        </div>
    </div>

    <!-- Modal de Confirmação de Aprovação/Negação (opcional, podemos usar alert) -->

    <!-- Demais modais já existentes (entrada, saída, relatórios) serão mantidos -->
    <!-- Modal de Entrada (já existente) -->
    <div class="modal-overlay" id="modal-entrada"> <!-- conteúdo igual ao original, omitido por brevidade, mas deve permanecer -->
        <div class="modal">
            <div class="modal-header">📥 Registrar Entrada</div>
            <div class="modal-body">
                <div class="form-group"><label>Produto</label><select id="entrada-produto"></select></div>
                <div class="form-group"><label>Quantidade</label><input type="number" id="entrada-qtd" min="1" value="1"></div>
                <div class="form-group"><label>Valor Unitário (R$)</label><input type="number" id="entrada-valor" step="0.01" value="0.00"></div>
                <div class="form-group"><label>Fornecedor</label><input type="text" id="entrada-fornecedor"></div>
                <div class="form-group"><label>Nº Nota Fiscal</label><input type="text" id="entrada-nf"></div>
                <div class="form-group"><label>Data</label><input type="date" id="entrada-data"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="app.closeModal('modal-entrada')">Cancelar</button>
                <button class="btn btn-primary" onclick="app.registrarEntrada()">Registrar</button>
            </div>
        </div>
    </div>

    <!-- Modal de Saída (já existente) -->
    <div class="modal-overlay" id="modal-saida">
        <div class="modal">
            <div class="modal-header">📤 Registrar Saída</div>
            <div class="modal-body">
                <div class="form-group"><label>Produto</label><select id="saida-produto"></select></div>
                <div class="form-group"><label>Quantidade</label><input type="number" id="saida-qtd" min="1" value="1"></div>
                <div class="form-group"><label>Setor</label><input type="text" id="saida-setor"></div>
                <div class="form-group"><label>Responsável</label><input type="text" id="saida-responsavel"></div>
                <div class="form-group"><label>Data</label><input type="date" id="saida-data"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="app.closeModal('modal-saida')">Cancelar</button>
                <button class="btn btn-primary" onclick="app.registrarSaida()">Registrar</button>
            </div>
        </div>
    </div>

    <!-- Modal de Relatórios (já existente) -->
    <div class="modal-overlay" id="modal-relatorios">
        <div class="modal">
            <div class="modal-header">📊 Relatórios</div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Tipo</label>
                    <select id="relatorio-tipo">
                        <option value="entradas">Entradas</option>
                        <option value="saidas">Saídas</option>
                        <option value="solicitacoes">Solicitações</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Período</label>
                    <select id="relatorio-periodo">
                        <option value="7">Últimos 7 dias</option>
                        <option value="30">Últimos 30 dias</option>
                        <option value="90">Últimos 90 dias</option>
                    </select>
                </div>
                <button class="btn btn-primary" style="width:100%" onclick="app.gerarRelatorio()">Gerar</button>
                <div id="relatorio-resultado" style="margin-top:20px;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="app.closeModal('modal-relatorios')">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        const app = {
            currentUser: null,
            db: {
                users: [],
                products: [],
                requests: [],        // novas solicitações
                movements: [],
                categories: [
                    'Papelaria',
                    'Informática',
                    'Limpeza',
                    'Água mineral',
                    'Materiais de escritório',
                    'Higiene',
                    'Manutenção'
                ]
            },

            init: function() {
                this.loadDatabase();
                this.hideSplash();
                this.setupEventListeners();
                this.checkLoginState();
                this.forceLogoLoad();
            },

            forceLogoLoad: function() {
                const logos = ['splash-logo', 'login-logo', 'header-logo'];
                const timestamp = '?t=' + new Date().getTime();
                logos.forEach(id => {
                    const img = document.getElementById(id);
                    if (img) {
                        const originalSrc = img.src.split('?')[0];
                        img.src = originalSrc + timestamp;
                    }
                });
            },

            hideSplash: function() {
                setTimeout(() => {
                    document.getElementById('splash-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('splash-screen').style.display = 'none';
                    }, 500);
                }, 2000);
            },

            loadDatabase: function() {
                const saved = localStorage.getItem('almoxFacilDB');
                if (saved) {
                    this.db = JSON.parse(saved);
                    // Migração para novos campos
                    if (this.db.products) {
                        this.db.products.forEach(p => {
                            if (!p.description) p.description = 'Sem descrição';
                            if (!p.unit) p.unit = 'un';
                            if (!p.imageEmoji) p.imageEmoji = '📦';
                            if (!p.minStock) p.minStock = 5;
                        });
                    }
                    if (!this.db.requests) this.db.requests = [];
                } else {
                    this.initializeDefaultData();
                }
                this.saveDatabase();
            },

            initializeDefaultData: function() {
                this.db.users = [
                    { id: 1, name: 'Admin Principal', email: 'admin@ufpb.br', password: '123456', siape: '1234567', sector: 'Almoxarifado', role: 'admin' },
                    { id: 2, name: 'João Servidor', email: 'usuario@ufpb.br', password: '123456', siape: '7654321', sector: 'DCOMP', role: 'user' }
                ];

                this.db.products = [
                    { id: 1, name: 'Papel A4', description: 'Resma com 500 folhas', category: 'Papelaria', unit: 'resma', stock: 50, minStock: 10, location: 'A1', unitValue: 22.50, imageEmoji: '📄' },
                    { id: 2, name: 'Caneta Azul', description: 'Caneta esferográfica azul', category: 'Papelaria', unit: 'un', stock: 100, minStock: 20, location: 'A2', unitValue: 1.75, imageEmoji: '🖊️' },
                    { id: 3, name: 'Detergente', description: 'Detergente líquido 500ml', category: 'Limpeza', unit: 'un', stock: 5, minStock: 10, location: 'B1', unitValue: 3.20, imageEmoji: '🧼' },
                    { id: 4, name: 'Água Mineral', description: 'Garrafão 20L', category: 'Água mineral', unit: 'garrafão', stock: 30, minStock: 5, location: 'C1', unitValue: 12.00, imageEmoji: '💧' },
                    { id: 5, name: 'Mouse Óptico', description: 'Mouse USB preto', category: 'Informática', unit: 'un', stock: 8, minStock: 3, location: 'D2', unitValue: 25.90, imageEmoji: '🖱️' }
                ];

                this.db.requests = [];
                this.db.movements = [];

                this.saveDatabase();
            },

            saveDatabase: function() {
                localStorage.setItem('almoxFacilDB', JSON.stringify(this.db));
            },

            checkLoginState: function() {
                const savedUser = sessionStorage.getItem('currentUser');
                if (savedUser) {
                    this.currentUser = JSON.parse(savedUser);
                    this.showApp();
                }
            },

            login: function() {
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;
                const user = this.db.users.find(u => u.email === email && u.password === password);
                if (user) {
                    this.currentUser = user;
                    sessionStorage.setItem('currentUser', JSON.stringify(user));
                    this.showApp();
                } else {
                    alert('E-mail ou senha inválidos!');
                }
            },

            logout: function() {
                sessionStorage.removeItem('currentUser');
                this.currentUser = null;
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            },

            showApp: function() {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                document.getElementById('user-greeting').textContent = 
                    `Olá, ${this.currentUser.name.split(' ')[0]} (${this.getRoleName(this.currentUser.role)})`;
                this.renderCatalog(); // início com catálogo
                this.renderBottomNav('catalog');
            },

            getRoleName: function(role) {
                const roles = { 'admin': 'Administrador', 'user': 'Usuário' };
                return roles[role] || role;
            },

            renderBottomNav: function(active) {
                const nav = document.getElementById('bottom-nav');
                const isAdmin = this.currentUser.role === 'admin';
                nav.innerHTML = `
                    <button class="nav-item ${active === 'catalog' ? 'active' : ''}" onclick="app.renderCatalog()"><span>📋</span><span>Catálogo</span></button>
                    <button class="nav-item ${active === 'requests' ? 'active' : ''}" onclick="app.renderMinhasSolicitacoes()"><span>📦</span><span>Minhas Solic.</span></button>
                    ${isAdmin ? `
                        <button class="nav-item ${active === 'admin' ? 'active' : ''}" onclick="app.renderAdminPanel()"><span>⚙️</span><span>Admin</span></button>
                        <button class="nav-item ${active === 'relatorios' ? 'active' : ''}" onclick="app.openModal('modal-relatorios')"><span>📊</span><span>Relatórios</span></button>
                    ` : ''}
                `;
            },

            // ---------- CATÁLOGO ----------
            renderCatalog: function() {
                const content = document.getElementById('main-content');
                let html = `
                    <div style="margin-bottom:20px;">
                        <input type="text" placeholder="🔍 Buscar material..." style="width:100%; padding:15px; border:1px solid var(--cinza-borda); border-radius:15px;" onkeyup="app.filterCatalog(event)">
                    </div>
                    <div style="display:flex; gap:10px; overflow-x:auto; margin-bottom:20px;">
                        <button class="action-btn active" onclick="app.filterCatalogByCategory('all')">Todos</button>
                        ${this.db.categories.map(cat => `<button class="action-btn" onclick="app.filterCatalogByCategory('${cat}')">${cat}</button>`).join('')}
                    </div>
                    <div class="catalog-grid" id="catalog-grid">
                `;

                this.db.products.forEach(p => {
                    const status = p.stock === 0 ? 'zero' : (p.stock <= p.minStock ? 'low' : 'normal');
                    const statusText = p.stock === 0 ? 'Zerado' : (p.stock <= p.minStock ? 'Baixo' : 'Normal');
                    html += `
                        <div class="product-card" data-category="${p.category}" data-name="${p.name.toLowerCase()}">
                            <div class="product-image">${p.imageEmoji || '📦'}</div>
                            <div class="product-info">
                                <h4>${p.name}</h4>
                                <div class="product-category">${p.category}</div>
                                <div class="product-desc">${p.description}</div>
                                <div class="product-stock">
                                    <span class="product-qty">${p.stock} ${p.unit}</span>
                                    <span class="stock-badge ${status}">${statusText}</span>
                                </div>
                                <button class="btn-solicitar" onclick="app.abrirSolicitacao(${p.id})">Solicitar</button>
                            </div>
                        </div>
                    `;
                });

                html += '</div>';
                content.innerHTML = html;
                this.renderBottomNav('catalog');
            },

            filterCatalog: function(e) {
                const search = e.target.value.toLowerCase();
                document.querySelectorAll('.product-card').forEach(card => {
                    const name = card.dataset.name;
                    card.style.display = name.includes(search) ? 'block' : 'none';
                });
            },

            filterCatalogByCategory: function(category) {
                document.querySelectorAll('.product-card').forEach(card => {
                    if (category === 'all' || card.dataset.category === category) {
                        card.style.display = 'block';
                    } else {
                        card.style.display = 'none';
                    }
                });
                document.querySelectorAll('.action-btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
            },

            abrirSolicitacao: function(productId) {
                const product = this.db.products.find(p => p.id === productId);
                if (!product) return;
                document.getElementById('solicitar-produto-id').value = productId;
                document.getElementById('solicitar-produto-nome').innerText = product.name;
                document.getElementById('solicitar-estoque-disponivel').innerText = product.stock;
                document.getElementById('solicitar-qtd').value = 1;
                document.getElementById('solicitar-qtd').max = product.stock;
                document.getElementById('solicitar-setor').value = this.currentUser.sector || '';
                document.getElementById('solicitar-obs').value = '';
                this.openModal('modal-solicitar');
            },

            enviarSolicitacao: function() {
                const productId = parseInt(document.getElementById('solicitar-produto-id').value);
                const qtd = parseInt(document.getElementById('solicitar-qtd').value);
                const setor = document.getElementById('solicitar-setor').value;
                const obs = document.getElementById('solicitar-obs').value;
                const product = this.db.products.find(p => p.id === productId);
                if (!product) return;
                if (qtd <= 0) { alert('Quantidade inválida'); return; }
                if (qtd > product.stock) { alert('Estoque insuficiente'); return; }

                const request = {
                    id: Date.now(),
                    productId: productId,
                    productName: product.name,
                    userId: this.currentUser.id,
                    requesterName: this.currentUser.name,
                    sector: setor,
                    qty: qtd,
                    observation: obs,
                    date: new Date().toISOString().split('T')[0],
                    status: 'pendente' // pendente, aprovado, negado
                };
                this.db.requests.push(request);
                this.saveDatabase();
                this.closeModal('modal-solicitar');
                alert('Solicitação enviada com sucesso!');
                // Se quiser, redireciona para minhas solicitações
                this.renderMinhasSolicitacoes();
                this.renderBottomNav('requests');
            },

            // ---------- MINHAS SOLICITAÇÕES ----------
            renderMinhasSolicitacoes: function() {
                const content = document.getElementById('main-content');
                const userRequests = this.db.requests.filter(r => r.userId === this.currentUser.id).sort((a,b) => b.id - a.id);
                let html = '<h3>Minhas Solicitações</h3>';
                if (userRequests.length === 0) {
                    html += '<p style="text-align:center; color:var(--texto-secundario);">Nenhuma solicitação ainda.</p>';
                } else {
                    userRequests.forEach(r => {
                        const statusClass = r.status === 'pendente' ? 'status-pending' : (r.status === 'aprovado' ? 'status-approved' : 'status-rejected');
                        const statusText = r.status === 'pendente' ? 'Pendente' : (r.status === 'aprovado' ? 'Aprovado' : 'Negado');
                        html += `
                            <div class="request-card">
                                <div class="request-header">
                                    <strong>${r.productName}</strong>
                                    <span class="request-status ${statusClass}">${statusText}</span>
                                </div>
                                <p>Quantidade: ${r.qty} | Setor: ${r.sector}</p>
                                <p>Data: ${r.date} | Obs: ${r.observation || '-'}</p>
                            </div>
                        `;
                    });
                }
                content.innerHTML = html;
                this.renderBottomNav('requests');
            },

            // ---------- PAINEL ADMIN ----------
            renderAdminPanel: function() {
                const content = document.getElementById('main-content');
                let html = `
                    <div style="display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap;">
                        <button class="action-btn primary" onclick="app.abrirNovoProduto()">➕ Novo Produto</button>
                        <button class="action-btn" onclick="app.abrirGerenciarSolicitacoes()">📋 Solicitações Pendentes</button>
                        <button class="action-btn" onclick="app.openModal('modal-entrada')">📥 Entrada</button>
                        <button class="action-btn" onclick="app.openModal('modal-saida')">📤 Saída</button>
                    </div>
                    <h3>Produtos</h3>
                    <ul class="item-list" id="admin-product-list">
                `;

                this.db.products.forEach(p => {
                    html += `
                        <li class="item-card">
                            <div class="item-icon">${p.imageEmoji || '📦'}</div>
                            <div class="item-info">
                                <h4>${p.name}</h4>
                                <div>Estoque: ${p.stock} ${p.unit} (mín: ${p.minStock})</div>
                                <div style="font-size:12px;">${p.category} | R$ ${(p.unitValue||0).toFixed(2)}</div>
                            </div>
                            <div>
                                <button onclick="app.editarProduto(${p.id})" style="background:none; border:none; font-size:20px;">✏️</button>
                                <button onclick="app.excluirProduto(${p.id})" style="background:none; border:none; font-size:20px;">🗑️</button>
                            </div>
                        </li>
                    `;
                });

                html += '</ul>';
                content.innerHTML = html;
                this.renderBottomNav('admin');
            },

            abrirNovoProduto: function() {
                document.getElementById('modal-produto-titulo').innerText = 'Novo Produto';
                document.getElementById('produto-id').value = '';
                document.getElementById('produto-nome').value = '';
                document.getElementById('produto-descricao').value = '';
                document.getElementById('produto-categoria').innerHTML = this.db.categories.map(c => `<option>${c}</option>`).join('');
                document.getElementById('produto-unidade').value = 'un';
                document.getElementById('produto-estoque').value = 0;
                document.getElementById('produto-min').value = 5;
                document.getElementById('produto-localizacao').value = '';
                document.getElementById('produto-valor').value = '0.00';
                document.getElementById('produto-emoji').value = '📦';
                this.openModal('modal-produto');
            },

            editarProduto: function(id) {
                const p = this.db.products.find(p => p.id === id);
                if (!p) return;
                document.getElementById('modal-produto-titulo').innerText = 'Editar Produto';
                document.getElementById('produto-id').value = p.id;
                document.getElementById('produto-nome').value = p.name;
                document.getElementById('produto-descricao').value = p.description || '';
                document.getElementById('produto-categoria').innerHTML = this.db.categories.map(c => `<option ${c === p.category ? 'selected' : ''}>${c}</option>`).join('');
                document.getElementById('produto-unidade').value = p.unit || 'un';
                document.getElementById('produto-estoque').value = p.stock;
                document.getElementById('produto-min').value = p.minStock;
                document.getElementById('produto-localizacao').value = p.location || '';
                document.getElementById('produto-valor').value = p.unitValue || 0;
                document.getElementById('produto-emoji').value = p.imageEmoji || '📦';
                this.openModal('modal-produto');
            },

            salvarProduto: function() {
                const id = document.getElementById('produto-id').value;
                const produto = {
                    id: id ? parseInt(id) : Date.now(),
                    name: document.getElementById('produto-nome').value,
                    description: document.getElementById('produto-descricao').value,
                    category: document.getElementById('produto-categoria').value,
                    unit: document.getElementById('produto-unidade').value,
                    stock: parseInt(document.getElementById('produto-estoque').value) || 0,
                    minStock: parseInt(document.getElementById('produto-min').value) || 5,
                    location: document.getElementById('produto-localizacao').value,
                    unitValue: parseFloat(document.getElementById('produto-valor').value) || 0,
                    imageEmoji: document.getElementById('produto-emoji').value || '📦'
                };
                if (!produto.name) { alert('Nome obrigatório'); return; }
                if (id) {
                    // editar
                    const index = this.db.products.findIndex(p => p.id === parseInt(id));
                    if (index !== -1) this.db.products[index] = produto;
                } else {
                    this.db.products.push(produto);
                }
                this.saveDatabase();
                this.closeModal('modal-produto');
                this.renderAdminPanel();
            },

            excluirProduto: function(id) {
                if (confirm('Deseja realmente excluir este produto?')) {
                    this.db.products = this.db.products.filter(p => p.id !== id);
                    this.saveDatabase();
                    this.renderAdminPanel();
                }
            },

            abrirGerenciarSolicitacoes: function() {
                const pendentes = this.db.requests.filter(r => r.status === 'pendente');
                let html = '';
                if (pendentes.length === 0) {
                    html = '<p>Nenhuma solicitação pendente.</p>';
                } else {
                    pendentes.forEach(r => {
                        html += `
                            <div class="request-card">
                                <p><strong>${r.productName}</strong> - ${r.qty} unidades</p>
                                <p>Solicitante: ${r.requesterName} (${r.sector})</p>
                                <p>Data: ${r.date}</p>
                                <div class="request-actions">
                                    <button class="btn btn-success" onclick="app.aprovarSolicitacao(${r.id})">Aprovar</button>
                                    <button class="btn btn-danger" onclick="app.negarSolicitacao(${r.id})">Negar</button>
                                </div>
                            </div>
                        `;
                    });
                }
                document.getElementById('lista-solicitacoes-pendentes').innerHTML = html;
                this.openModal('modal-gerir-solicitacoes');
            },

            aprovarSolicitacao: function(requestId) {
                const req = this.db.requests.find(r => r.id === requestId);
                if (!req) return;
                const product = this.db.products.find(p => p.id === req.productId);
                if (!product) return;
                if (product.stock < req.qty) {
                    alert('Estoque insuficiente para atender esta solicitação.');
                    return;
                }
                product.stock -= req.qty;
                req.status = 'aprovado';
                this.saveDatabase();
                this.abrirGerenciarSolicitacoes(); // atualiza lista
                this.renderAdminPanel(); // atualiza estoque
            },

            negarSolicitacao: function(requestId) {
                const req = this.db.requests.find(r => r.id === requestId);
                if (req) {
                    req.status = 'negado';
                    this.saveDatabase();
                    this.abrirGerenciarSolicitacoes();
                }
            },

            // ---------- MODAIS EXISTENTES (entrada/saída) ajustados ----------
            openModal: function(modalId) {
                if (modalId === 'modal-entrada' || modalId === 'modal-saida') {
                    this.updateProductSelects();
                }
                if (modalId === 'modal-relatorios') {
                    document.getElementById('relatorio-resultado').innerHTML = '';
                }
                document.getElementById(modalId).classList.add('active');
            },

            closeModal: function(modalId) {
                document.getElementById(modalId).classList.remove('active');
            },

            updateProductSelects: function() {
                const entradaSelect = document.getElementById('entrada-produto');
                const saidaSelect = document.getElementById('saida-produto');
                entradaSelect.innerHTML = this.db.products.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
                saidaSelect.innerHTML = this.db.products.filter(p => p.stock > 0).map(p => `<option value="${p.id}">${p.name} (${p.stock})</option>`).join('');
                const today = new Date().toISOString().split('T')[0];
                if (document.getElementById('entrada-data')) document.getElementById('entrada-data').value = today;
                if (document.getElementById('saida-data')) document.getElementById('saida-data').value = today;
            },

            registrarEntrada: function() {
                const productId = parseInt(document.getElementById('entrada-produto').value);
                const qtd = parseInt(document.getElementById('entrada-qtd').value);
                const valor = parseFloat(document.getElementById('entrada-valor').value) || 0;
                const fornecedor = document.getElementById('entrada-fornecedor').value;
                const nf = document.getElementById('entrada-nf').value;
                const data = document.getElementById('entrada-data').value;
                if (!productId || !qtd || !fornecedor || !nf) { alert('Preencha todos'); return; }
                const product = this.db.products.find(p => p.id === productId);
                if (valor > 0) product.unitValue = valor;
                product.stock += qtd;
                this.db.movements.push({ id: Date.now(), type: 'entrada', productId, qtd, valor, fornecedor, nf, data, userId: this.currentUser.id });
                this.saveDatabase();
                this.closeModal('modal-entrada');
                alert('Entrada registrada');
                this.renderAdminPanel();
            },

            registrarSaida: function() {
                const productId = parseInt(document.getElementById('saida-produto').value);
                const qtd = parseInt(document.getElementById('saida-qtd').value);
                const setor = document.getElementById('saida-setor').value;
                const responsavel = document.getElementById('saida-responsavel').value;
                const data = document.getElementById('saida-data').value;
                if (!productId || !qtd || !setor || !responsavel) { alert('Preencha todos'); return; }
                const product = this.db.products.find(p => p.id === productId);
                if (product.stock < qtd) { alert('Estoque insuficiente'); return; }
                product.stock -= qtd;
                this.db.movements.push({ id: Date.now(), type: 'saida', productId, qtd, setor, responsavel, data, userId: this.currentUser.id });
                this.saveDatabase();
                this.closeModal('modal-saida');
                alert('Saída registrada');
                this.renderAdminPanel();
            },

            gerarRelatorio: function() {
                const tipo = document.getElementById('relatorio-tipo').value;
                const dias = parseInt(document.getElementById('relatorio-periodo').value);
                const dataLimite = new Date();
                dataLimite.setDate(dataLimite.getDate() - dias);
                let dados;
                if (tipo === 'solicitacoes') {
                    dados = this.db.requests.filter(r => new Date(r.date) >= dataLimite);
                } else {
                    dados = this.db.movements.filter(m => m.type === tipo && new Date(m.date) >= dataLimite);
                }
                let html = '<h4>Resultado:</h4><ul>';
                dados.slice(0,20).forEach(item => {
                    if (tipo === 'solicitacoes') {
                        html += `<li>${item.productName} - ${item.qty} (${item.status}) - ${item.date}</li>`;
                    } else {
                        const prod = this.db.products.find(p => p.id === item.productId);
                        html += `<li>${prod ? prod.name : ''} - ${item.qtd} - ${item.date}</li>`;
                    }
                });
                if (dados.length === 0) html += '<li>Nenhum registro</li>';
                html += '</ul>';
                document.getElementById('relatorio-resultado').innerHTML = html;
            },

            setupEventListeners: function() {
                document.querySelectorAll('.modal-overlay').forEach(modal => {
                    modal.addEventListener('click', function(e) {
                        if (e.target === this) this.classList.remove('active');
                    });
                });
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
