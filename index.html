<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A4B8C">
    <title>Almox Fácil CT</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        :root {
            --azul-institucional: #0A4B8C;
            --azul-escuro: #083A6E;
            --azul-claro: #E6F0FA;
            --branco: #FFFFFF;
            --cinza-claro: #F5F7FA;
            --cinza-borda: #E1E5EA;
            --texto-principal: #2C3E50;
            --texto-secundario: #7F8C8D;
            --verde: #27AE60;
            --amarelo: #F39C12;
            --vermelho: #E74C3C;
        }

        body {
            background-color: var(--cinza-claro);
            color: var(--texto-principal);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--azul-institucional), var(--azul-escuro));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            transition: opacity 0.5s;
        }

        #splash-screen .logo {
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.15);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
        }

        #splash-screen span {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* Container Principal */
        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--branco);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--azul-institucional), var(--azul-escuro));
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            box-shadow: 0 4px 15px rgba(10,75,140,0.3);
        }

        .header-title h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .header-title p {
            font-size: 12px;
            opacity: 0.9;
        }

        .header-icons {
            display: flex;
            gap: 15px;
        }

        .header-icons button {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            cursor: pointer;
        }

        /* Menu de Navegação */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            max-width: 500px;
            width: 100%;
            background: var(--branco);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid var(--cinza-borda);
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.03);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--texto-secundario);
            font-size: 12px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px 15px;
            border-radius: 12px;
        }

        .nav-item.active {
            color: var(--azul-institucional);
            background: var(--azul-claro);
        }

        .nav-item span {
            font-size: 20px;
        }

        /* Conteúdo Principal */
        .main-content {
            padding: 20px;
            padding-bottom: 80px;
        }

        /* Cards do Dashboard */
        .dashboard-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--branco);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid var(--cinza-borda);
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: var(--azul-institucional);
            margin-bottom: 5px;
        }

        .stat-card .label {
            font-size: 13px;
            color: var(--texto-secundario);
        }

        .stat-card.warning .value { color: var(--amarelo); }
        .stat-card.danger .value { color: var(--vermelho); }

        /* Ações Rápidas */
        .quick-actions {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0 20px;
            margin-bottom: 10px;
        }

        .quick-actions::-webkit-scrollbar {
            display: none;
        }

        .action-btn {
            background: var(--branco);
            border: 1px solid var(--cinza-borda);
            padding: 12px 20px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 500;
            color: var(--texto-principal);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            cursor: pointer;
        }

        .action-btn.primary {
            background: var(--azul-institucional);
            color: white;
            border: none;
        }

        /* Listas */
        .list-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 15px;
        }

        .list-title h3 {
            font-size: 18px;
            color: var(--texto-principal);
        }

        .item-list {
            list-style: none;
        }

        .item-card {
            background: var(--branco);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 10px;
            border: 1px solid var(--cinza-borda);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .item-icon {
            width: 50px;
            height: 50px;
            background: var(--azul-claro);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--azul-institucional);
        }

        .item-info {
            flex: 1;
        }

        .item-info h4 {
            font-size: 16px;
            margin-bottom: 5px;
        }

        .item-info .category {
            font-size: 12px;
            color: var(--texto-secundario);
            margin-bottom: 5px;
        }

        .stock-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stock-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .stock-badge.normal {
            background: #E8F5E9;
            color: var(--verde);
        }

        .stock-badge.low {
            background: #FFF3E0;
            color: var(--amarelo);
        }

        .stock-badge.zero {
            background: #FFEBEE;
            color: var(--vermelho);
        }

        .stock-qty {
            font-weight: 600;
            color: var(--texto-principal);
        }

        /* Modais */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--branco);
            width: 90%;
            max-width: 450px;
            border-radius: 25px;
            overflow: hidden;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 20px;
            background: var(--azul-institucional);
            color: white;
            font-weight: 600;
            font-size: 18px;
        }

        .modal-body {
            padding: 20px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid var(--cinza-borda);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* Formulários */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--texto-secundario);
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--cinza-borda);
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--azul-institucional);
        }

        /* Botões */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--azul-institucional);
            color: white;
        }

        .btn-secondary {
            background: var(--cinza-claro);
            color: var(--texto-principal);
        }

        .btn-danger {
            background: var(--vermelho);
            color: white;
        }

        /* Login Screen */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--azul-institucional), var(--azul-escuro));
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .login-box {
            background: var(--branco);
            width: 90%;
            max-width: 400px;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .login-box h2 {
            color: var(--azul-institucional);
            margin-bottom: 20px;
            text-align: center;
        }

        .login-box .logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
        }

        /* Água Fácil CT */
        .water-stats {
            background: linear-gradient(135deg, var(--azul-claro), white);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .water-progress {
            height: 10px;
            background: var(--cinza-borda);
            border-radius: 5px;
            margin: 15px 0;
            overflow: hidden;
        }

        .water-progress-bar {
            height: 100%;
            background: var(--azul-institucional);
            width: 0%;
            transition: width 0.3s;
        }

        /* Responsividade */
        @media (max-width: 400px) {
            .dashboard-cards {
                grid-template-columns: 1fr;
            }
        }

        /* Loading */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--cinza-claro);
            border-top-color: var(--azul-institucional);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="splash-screen">
        <div class="logo">📦</div>
        <span>Almox Fácil CT</span>
    </div>

    <div id="login-screen">
        <div class="login-box">
            <div class="logo">📦</div>
            <h2>Almox Fácil CT</h2>
            <div class="form-group">
                <label>E-mail institucional</label>
                <input type="email" id="login-email" placeholder="usuario@ct.ufpb.br">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="login-password" placeholder="******">
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="app.login()">Entrar</button>
            <p style="text-align: center; margin-top: 15px; font-size: 13px; color: var(--texto-secundario);">
                Use admin@ufpb.br / 123456 para admin<br>
                usuario@ufpb.br / 123456 para usuário comum
            </p>
        </div>
    </div>

    <div class="app-container" id="app-container" style="display: none;">
        <div class="header">
            <div class="header-title">
                <h1>Almox Fácil CT</h1>
                <p id="user-greeting">Carregando...</p>
            </div>
            <div class="header-icons">
                <button onclick="app.logout()">🚪</button>
            </div>
        </div>

        <div class="main-content" id="main-content"></div>

        <nav class="bottom-nav" id="bottom-nav"></nav>
    </div>

    <!-- Modal de Entrada de Materiais -->
    <div class="modal-overlay" id="modal-entrada">
        <div class="modal">
            <div class="modal-header">Registrar Entrada</div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Produto</label>
                    <select id="entrada-produto"></select>
                </div>
                <div class="form-group">
                    <label>Quantidade</label>
                    <input type="number" id="entrada-qtd" min="1" value="1">
                </div>
                <div class="form-group">
                    <label>Fornecedor</label>
                    <input type="text" id="entrada-fornecedor">
                </div>
                <div class="form-group">
                    <label>Nº Nota Fiscal</label>
                    <input type="text" id="entrada-nf">
                </div>
                <div class="form-group">
                    <label>Data</label>
                    <input type="date" id="entrada-data">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="app.closeModal('modal-entrada')">Cancelar</button>
                <button class="btn btn-primary" onclick="app.registrarEntrada()">Registrar</button>
            </div>
        </div>
    </div>

    <!-- Modal de Saída de Materiais -->
    <div class="modal-overlay" id="modal-saida">
        <div class="modal">
            <div class="modal-header">Registrar Saída</div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Produto</label>
                    <select id="saida-produto"></select>
                </div>
                <div class="form-group">
                    <label>Quantidade</label>
                    <input type="number" id="saida-qtd" min="1" value="1">
                </div>
                <div class="form-group">
                    <label>Setor Solicitante</label>
                    <input type="text" id="saida-setor">
                </div>
                <div class="form-group">
                    <label>Responsável</label>
                    <input type="text" id="saida-responsavel">
                </div>
                <div class="form-group">
                    <label>Data</label>
                    <input type="date" id="saida-data">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="app.closeModal('modal-saida')">Cancelar</button>
                <button class="btn btn-primary" onclick="app.registrarSaida()">Registrar</button>
            </div>
        </div>
    </div>

    <!-- Modal de Solicitação de Água -->
    <div class="modal-overlay" id="modal-agua">
        <div class="modal">
            <div class="modal-header">Solicitar Água</div>
            <div class="modal-body">
                <p>Estoque atual: <strong id="agua-estoque-atual">0</strong> garrafões</p>
                <div class="form-group">
                    <label>Quantidade solicitada</label>
                    <input type="number" id="agua-qtd" min="1" value="1">
                </div>
                <div class="form-group">
                    <label>Setor</label>
                    <input type="text" id="agua-setor">
                </div>
                <p id="agua-previsao"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="app.closeModal('modal-agua')">Cancelar</button>
                <button class="btn btn-primary" onclick="app.solicitarAgua()">Solicitar</button>
            </div>
        </div>
    </div>

    <!-- Modal de Relatórios -->
    <div class="modal-overlay" id="modal-relatorios">
        <div class="modal">
            <div class="modal-header">Relatórios</div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Tipo de relatório</label>
                    <select id="relatorio-tipo">
                        <option value="entradas">Entradas</option>
                        <option value="saidas">Saídas</option>
                        <option value="consumo-setor">Consumo por Setor</option>
                        <option value="mais-utilizados">Itens mais utilizados</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Período</label>
                    <select id="relatorio-periodo">
                        <option value="7">Últimos 7 dias</option>
                        <option value="30">Últimos 30 dias</option>
                        <option value="90">Últimos 90 dias</option>
                        <option value="365">Último ano</option>
                    </select>
                </div>
                <button class="btn btn-primary" style="width:100%" onclick="app.gerarRelatorio()">Gerar Relatório</button>
                <div id="relatorio-resultado" style="margin-top: 20px;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="app.closeModal('modal-relatorios')">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        const app = {
            currentUser: null,
            db: {
                users: [],
                products: [],
                movements: [],
                waterStock: 30,
                waterRequests: [],
                categories: [
                    'Material de Expediente',
                    'Material de Limpeza',
                    'Higiene',
                    'Informática',
                    'Manutenção'
                ]
            },

            init: function() {
                this.loadDatabase();
                this.hideSplash();
                this.setupEventListeners();
                this.checkLoginState();
            },

            hideSplash: function() {
                setTimeout(() => {
                    document.getElementById('splash-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('splash-screen').style.display = 'none';
                    }, 500);
                }, 1500);
            },

            loadDatabase: function() {
                const saved = localStorage.getItem('almoxFacilDB');
                if (saved) {
                    this.db = JSON.parse(saved);
                } else {
                    this.initializeDefaultData();
                }
            },

            initializeDefaultData: function() {
                // Usuários de exemplo
                this.db.users = [
                    {
                        id: 1,
                        name: 'Admin Principal',
                        email: 'admin@ufpb.br',
                        password: '123456',
                        siape: '1234567',
                        sector: 'Almoxarifado',
                        role: 'admin',
                        location: 'Bloco A - Sala 101'
                    },
                    {
                        id: 2,
                        name: 'João Servidor',
                        email: 'usuario@ufpb.br',
                        password: '123456',
                        siape: '7654321',
                        sector: 'Departamento de Computação',
                        role: 'user',
                        location: 'Bloco B - Sala 205'
                    },
                    {
                        id: 3,
                        name: 'Maria Limpeza',
                        email: 'terceirizado@ufpb.br',
                        password: '123456',
                        sector: 'Equipe de Limpeza',
                        role: 'gestor_terceirizado',
                        location: 'Bloco C'
                    }
                ];

                // Produtos de exemplo
                this.db.products = [
                    { id: 1, name: 'Papel A4 (Resma)', category: 'Material de Expediente', stock: 50, minStock: 10, location: 'Prateleira A1' },
                    { id: 2, name: 'Caneta Azul', category: 'Material de Expediente', stock: 100, minStock: 20, location: 'Prateleira A2' },
                    { id: 3, name: 'Detergente Líquido', category: 'Material de Limpeza', stock: 5, minStock: 10, location: 'Prateleira B1' },
                    { id: 4, name: 'Álcool 70%', category: 'Higiene', stock: 8, minStock: 15, location: 'Prateleira B2' },
                    { id: 5, name: 'Cloro', category: 'Material de Limpeza', stock: 0, minStock: 5, location: 'Prateleira B3' },
                    { id: 6, name: 'Papel Higiênico (pacote)', category: 'Higiene', stock: 20, minStock: 10, location: 'Prateleira C1' }
                ];

                this.saveDatabase();
            },

            saveDatabase: function() {
                localStorage.setItem('almoxFacilDB', JSON.stringify(this.db));
            },

            checkLoginState: function() {
                const savedUser = sessionStorage.getItem('currentUser');
                if (savedUser) {
                    this.currentUser = JSON.parse(savedUser);
                    this.showApp();
                } else {
                    document.getElementById('login-screen').style.display = 'flex';
                }
            },

            login: function() {
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;

                const user = this.db.users.find(u => u.email === email && u.password === password);

                if (user) {
                    this.currentUser = user;
                    sessionStorage.setItem('currentUser', JSON.stringify(user));
                    this.showApp();
                } else {
                    alert('E-mail ou senha inválidos!');
                }
            },

            logout: function() {
                sessionStorage.removeItem('currentUser');
                this.currentUser = null;
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            },

            showApp: function() {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                document.getElementById('user-greeting').textContent = 
                    `Olá, ${this.currentUser.name.split(' ')[0]} (${this.getRoleName(this.currentUser.role)})`;
                
                this.renderDashboard();
            },

            getRoleName: function(role) {
                const roles = {
                    'admin': 'Administrador',
                    'user': 'Usuário',
                    'gestor_terceirizado': 'Gestor Terceirizado'
                };
                return roles[role] || role;
            },

            renderDashboard: function() {
                const content = document.getElementById('main-content');
                const isAdmin = this.currentUser.role === 'admin';
                const isGestor = this.currentUser.role === 'gestor_terceirizado';

                // Calcular estatísticas
                const totalItems = this.db.products.length;
                const lowStock = this.db.products.filter(p => p.stock > 0 && p.stock <= p.minStock).length;
                const zeroStock = this.db.products.filter(p => p.stock === 0).length;
                const pendingRequests = this.db.waterRequests.filter(r => r.status === 'pending').length;

                // Calcular consumo mensal (simulado)
                const monthlyConsumption = this.db.movements.filter(m => {
                    const date = new Date(m.date);
                    const now = new Date();
                    return m.type === 'saida' && 
                           date.getMonth() === now.getMonth() &&
                           date.getFullYear() === now.getFullYear();
                }).reduce((acc, m) => acc + m.qty, 0);

                let html = `
                    <div class="dashboard-cards">
                        <div class="stat-card">
                            <div class="value">${totalItems}</div>
                            <div class="label">Total de Itens</div>
                        </div>
                        <div class="stat-card warning">
                            <div class="value">${lowStock}</div>
                            <div class="label">Estoque Baixo</div>
                        </div>
                        <div class="stat-card danger">
                            <div class="value">${zeroStock}</div>
                            <div class="label">Estoque Zerado</div>
                        </div>
                        <div class="stat-card">
                            <div class="value">${monthlyConsumption}</div>
                            <div class="label">Consumo Mensal</div>
                        </div>
                    </div>
                `;

                // Ações rápidas baseadas no perfil
                html += '<div class="quick-actions">';
                
                if (isAdmin) {
                    html += `
                        <button class="action-btn primary" onclick="app.openModal('modal-entrada')">
                            <span>📥</span> Entrada
                        </button>
                        <button class="action-btn" onclick="app.openModal('modal-saida')">
                            <span>📤</span> Saída
                        </button>
                    `;
                }

                html += `
                    <button class="action-btn" onclick="app.renderEstoque()">
                        <span>📋</span> Estoque
                    </button>
                    <button class="action-btn" onclick="app.renderAgua()">
                        <span>💧</span> Água Fácil
                    </button>
                `;

                if (isGestor) {
                    html += `
                        <button class="action-btn" onclick="app.solicitarLimpeza()">
                            <span>🧹</span> Limpeza
                        </button>
                    `;
                }

                if (isAdmin) {
                    html += `
                        <button class="action-btn" onclick="app.openModal('modal-relatorios')">
                            <span>📊</span> Relatórios
                        </button>
                    `;
                }

                html += '</div>';

                // Últimas movimentações (para admin)
                if (isAdmin) {
                    html += `
                        <div class="list-title">
                            <h3>Últimas Movimentações</h3>
                        </div>
                        <ul class="item-list">
                    `;

                    const lastMovements = this.db.movements.slice(-5).reverse();
                    lastMovements.forEach(m => {
                        const product = this.db.products.find(p => p.id === m.productId);
                        html += `
                            <li class="item-card">
                                <div class="item-icon">${m.type === 'entrada' ? '📥' : '📤'}</div>
                                <div class="item-info">
                                    <h4>${product ? product.name : 'Produto'}</h4>
                                    <div class="category">${m.qty} unidades - ${new Date(m.date).toLocaleDateString()}</div>
                                </div>
                            </li>
                        `;
                    });

                    html += '</ul>';
                }

                // Solicitações pendentes de água (visível para todos)
                const pendingWater = this.db.waterRequests.filter(r => r.status === 'pending');
                if (pendingWater.length > 0) {
                    html += `
                        <div class="list-title">
                            <h3>Solicitações de Água Pendentes</h3>
                        </div>
                        <ul class="item-list">
                    `;

                    pendingWater.forEach(r => {
                        html += `
                            <li class="item-card">
                                <div class="item-icon">💧</div>
                                <div class="item-info">
                                    <h4>${r.qty} garrafão(ões)</h4>
                                    <div class="category">Setor: ${r.sector} - ${new Date(r.date).toLocaleDateString()}</div>
                                </div>
                                ${isAdmin ? `
                                    <div style="display: flex; gap: 5px;">
                                        <button class="btn btn-primary" style="padding: 5px 10px;" onclick="app.aprovarAgua(${r.id})">✓</button>
                                        <button class="btn btn-danger" style="padding: 5px 10px;" onclick="app.negarAgua(${r.id})">✗</button>
                                    </div>
                                ` : ''}
                            </li>
                        `;
                    });

                    html += '</ul>';
                }

                content.innerHTML = html;
                this.renderBottomNav('dashboard');
            },

            renderEstoque: function() {
                const content = document.getElementById('main-content');
                const isAdmin = this.currentUser.role === 'admin';

                let html = `
                    <div style="margin-bottom: 20px;">
                        <input type="text" placeholder="🔍 Buscar item..." 
                               style="width:100%; padding:15px; border:1px solid var(--cinza-borda); border-radius:15px;"
                               onkeyup="app.filterProducts(this.value)">
                    </div>

                    <div style="display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto;">
                        <button class="action-btn active" onclick="app.filterByCategory('all')">Todos</button>
                        ${this.db.categories.map(cat => 
                            `<button class="action-btn" onclick="app.filterByCategory('${cat}')">${cat}</button>`
                        ).join('')}
                    </div>

                    <ul class="item-list" id="product-list">
                `;

                this.db.products.forEach(p => {
                    const status = p.stock === 0 ? 'zero' : (p.stock <= p.minStock ? 'low' : 'normal');
                    const statusText = p.stock === 0 ? 'Estoque Zerado' : (p.stock <= p.minStock ? 'Estoque Baixo' : 'Estoque Normal');

                    html += `
                        <li class="item-card" data-category="${p.category}">
                            <div class="item-icon">📦</div>
                            <div class="item-info">
                                <h4>${p.name}</h4>
                                <div class="category">${p.category}</div>
                                <div class="stock-info">
                                    <span class="stock-qty">${p.stock} unidades</span>
                                    <span class="stock-badge ${status}">${statusText}</span>
                                </div>
                                <div style="font-size: 12px; color: var(--texto-secundario); margin-top: 5px;">
                                    Local: ${p.location}
                                </div>
                            </div>
                            ${isAdmin ? `
                                <div>
                                    <button onclick="app.editarProduto(${p.id})" style="background:none; border:none; font-size:20px;">✏️</button>
                                </div>
                            ` : ''}
                        </li>
                    `;
                });

                html += '</ul>';
                content.innerHTML = html;
                this.renderBottomNav('estoque');
            },

            renderAgua: function() {
                const content = document.getElementById('main-content');
                const isAdmin = this.currentUser.role === 'admin';

                // Calcular previsão de reposição (simples)
                const dailyConsumption = 5; // Média de consumo diário
                const daysUntilEmpty = Math.floor(this.db.waterStock / dailyConsumption);

                const waterRequests = this.db.waterRequests.filter(r => r.status === 'pending');
                const totalRequested = waterRequests.reduce((acc, r) => acc + r.qty, 0);

                html = `
                    <div class="water-stats">
                        <h3 style="margin-bottom: 15px;">💧 Água Fácil CT</h3>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                            <div style="background: white; padding: 15px; border-radius: 15px;">
                                <div style="font-size: 28px; font-weight: bold; color: var(--azul-institucional);">
                                    ${this.db.waterStock}
                                </div>
                                <div style="font-size: 13px; color: var(--texto-secundario);">Garrafões em estoque</div>
                            </div>
                            <div style="background: white; padding: 15px; border-radius: 15px;">
                                <div style="font-size: 28px; font-weight: bold; color: var(--azul-institucional);">
                                    ${totalRequested}
                                </div>
                                <div style="font-size: 13px; color: var(--texto-secundario);">Solicitações pendentes</div>
                            </div>
                        </div>

                        <div class="water-progress">
                            <div class="water-progress-bar" style="width: ${Math.min(100, (this.db.waterStock / 50) * 100)}%"></div>
                        </div>

                        <p style="text-align: center; margin: 10px 0;">
                            Previsão de reposição: <strong>${daysUntilEmpty > 0 ? daysUntilEmpty + ' dias' : 'Urgente!'}</strong>
                        </p>

                        <button class="btn btn-primary" style="width:100%;" onclick="app.openModal('modal-agua')">
                            Solicitar Água
                        </button>
                    </div>
                `;

                // Lista de solicitações
                if (this.db.waterRequests.length > 0) {
                    html += `
                        <div class="list-title">
                            <h3>Histórico de Solicitações</h3>
                        </div>
                        <ul class="item-list">
                    `;

                    this.db.waterRequests.slice(-10).reverse().forEach(r => {
                        const statusColor = r.status === 'approved' ? 'var(--verde)' : 
                                          (r.status === 'rejected' ? 'var(--vermelho)' : 'var(--amarelo)');
                        html += `
                            <li class="item-card">
                                <div class="item-icon">💧</div>
                                <div class="item-info">
                                    <h4>${r.qty} garrafão(ões)</h4>
                                    <div class="category">Setor: ${r.sector}</div>
                                    <div style="color: ${statusColor}; font-size: 12px; font-weight: 600;">
                                        Status: ${r.status === 'pending' ? 'Pendente' : (r.status === 'approved' ? 'Aprovado' : 'Negado')}
                                    </div>
                                </div>
                            </li>
                        `;
                    });

                    html += '</ul>';
                }

                content.innerHTML = html;
                this.renderBottomNav('agua');
            },

            renderBottomNav: function(active) {
                const nav = document.getElementById('bottom-nav');
                const isAdmin = this.currentUser.role === 'admin';

                nav.innerHTML = `
                    <button class="nav-item ${active === 'dashboard' ? 'active' : ''}" onclick="app.renderDashboard()">
                        <span>🏠</span>
                        <span>Início</span>
                    </button>
                    <button class="nav-item ${active === 'estoque' ? 'active' : ''}" onclick="app.renderEstoque()">
                        <span>📦</span>
                        <span>Estoque</span>
                    </button>
                    <button class="nav-item ${active === 'agua' ? 'active' : ''}" onclick="app.renderAgua()">
                        <span>💧</span>
                        <span>Água</span>
                    </button>
                    ${isAdmin ? `
                        <button class="nav-item ${active === 'relatorios' ? 'active' : ''}" onclick="app.openModal('modal-relatorios')">
                            <span>📊</span>
                            <span>Relatórios</span>
                        </button>
                    ` : ''}
                `;
            },

            openModal: function(modalId) {
                // Atualizar selects se necessário
                if (modalId === 'modal-entrada' || modalId === 'modal-saida') {
                    this.updateProductSelects();
                }
                if (modalId === 'modal-agua') {
                    document.getElementById('agua-estoque-atual').textContent = this.db.waterStock;
                    document.getElementById('agua-setor').value = this.currentUser.sector;
                    const days = Math.floor(this.db.waterStock / 5);
                    document.getElementById('agua-previsao').textContent = 
                        `Previsão de reposição: ${days > 0 ? days + ' dias' : 'Urgente!'}`;
                }
                document.getElementById(modalId).classList.add('active');
            },

            closeModal: function(modalId) {
                document.getElementById(modalId).classList.remove('active');
            },

            closeModals: function() {
                document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
            },

            updateProductSelects: function() {
                const entradaSelect = document.getElementById('entrada-produto');
                const saidaSelect = document.getElementById('saida-produto');

                entradaSelect.innerHTML = this.db.products.map(p => 
                    `<option value="${p.id}">${p.name} (Estoque: ${p.stock})</option>`
                ).join('');

                saidaSelect.innerHTML = this.db.products.filter(p => p.stock > 0).map(p => 
                    `<option value="${p.id}">${p.name} (Estoque: ${p.stock})</option>`
                ).join('');

                // Setar data atual
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('entrada-data').value = today;
                document.getElementById('saida-data').value = today;
            },

            registrarEntrada: function() {
                const productId = parseInt(document.getElementById('entrada-produto').value);
                const qtd = parseInt(document.getElementById('entrada-qtd').value);
                const fornecedor = document.getElementById('entrada-fornecedor').value;
                const nf = document.getElementById('entrada-nf').value;
                const data = document.getElementById('entrada-data').value;

                if (!productId || !qtd || !fornecedor || !nf) {
                    alert('Preencha todos os campos!');
                    return;
                }

                const product = this.db.products.find(p => p.id === productId);
                product.stock += qtd;

                this.db.movements.push({
                    id: Date.now(),
                    type: 'entrada',
                    productId,
                    qtd,
                    supplier: fornecedor,
                    nf,
                    date: data,
                    userId: this.currentUser.id
                });

                this.saveDatabase();
                this.closeModal('modal-entrada');
                this.renderDashboard();
                alert('Entrada registrada com sucesso!');
            },

            registrarSaida: function() {
                const productId = parseInt(document.getElementById('saida-produto').value);
                const qtd = parseInt(document.getElementById('saida-qtd').value);
                const setor = document.getElementById('saida-setor').value;
                const responsavel = document.getElementById('saida-responsavel').value;
                const data = document.getElementById('saida-data').value;

                if (!productId || !qtd || !setor || !responsavel) {
                    alert('Preencha todos os campos!');
                    return;
                }

                const product = this.db.products.find(p => p.id === productId);
                
                if (product.stock < qtd) {
                    alert('Estoque insuficiente!');
                    return;
                }

                product.stock -= qtd;

                this.db.movements.push({
                    id: Date.now(),
                    type: 'saida',
                    productId,
                    qtd,
                    sector: setor,
                    responsible: responsavel,
                    date: data,
                    userId: this.currentUser.id
                });

                this.saveDatabase();
                this.closeModal('modal-saida');
                this.renderDashboard();
                alert('Saída registrada com sucesso!');
            },

            solicitarAgua: function() {
                const qtd = parseInt(document.getElementById('agua-qtd').value);
                const setor = document.getElementById('agua-setor').value;

                if (!qtd || !setor) {
                    alert('Preencha todos os campos!');
                    return;
                }

                if (qtd > this.db.waterStock && this.currentUser.role !== 'admin') {
                    alert('Quantidade solicitada excede o estoque disponível!');
                    return;
                }

                this.db.waterRequests.push({
                    id: Date.now(),
                    qtd,
                    sector: setor,
                    date: new Date().toISOString(),
                    userId: this.currentUser.id,
                    status: 'pending'
                });

                if (this.currentUser.role === 'admin') {
                    // Admin pode retirar direto
                    this.db.waterStock -= qtd;
                }

                this.saveDatabase();
                this.closeModal('modal-agua');
                this.renderAgua();
                alert('Solicitação enviada com sucesso!');
            },

            aprovarAgua: function(requestId) {
                const request = this.db.waterRequests.find(r => r.id === requestId);
                if (request && request.status === 'pending') {
                    request.status = 'approved';
                    if (this.db.waterStock >= request.qtd) {
                        this.db.waterStock -= request.qtd;
                    }
                    this.saveDatabase();
                    this.renderDashboard();
                }
            },

            negarAgua: function(requestId) {
                const request = this.db.waterRequests.find(r => r.id === requestId);
                if (request) {
                    request.status = 'rejected';
                    this.saveDatabase();
                    this.renderDashboard();
                }
            },

            solicitarLimpeza: function() {
                // Simples redirecionamento para filtro de produtos de limpeza
                this.renderEstoque();
                this.filterByCategory('Material de Limpeza');
            },

            filterProducts: function(search) {
                const products = document.querySelectorAll('.item-card');
                products.forEach(p => {
                    const name = p.querySelector('h4').textContent.toLowerCase();
                    if (name.includes(search.toLowerCase())) {
                        p.style.display = 'flex';
                    } else {
                        p.style.display = 'none';
                    }
                });
            },

            filterByCategory: function(category) {
                const products = document.querySelectorAll('.item-card');
                products.forEach(p => {
                    if (category === 'all' || p.dataset.category === category) {
                        p.style.display = 'flex';
                    } else {
                        p.style.display = 'none';
                    }
                });

                // Atualizar botões ativos
                document.querySelectorAll('.action-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                event.target.classList.add('active');
            },

            editarProduto: function(productId) {
                const product = this.db.products.find(p => p.id === productId);
                const newStock = prompt(`Estoque atual: ${product.stock}\nDigite o novo estoque:`, product.stock);
                if (newStock !== null) {
                    product.stock = parseInt(newStock);
                    this.saveDatabase();
                    this.renderEstoque();
                }
            },

            gerarRelatorio: function() {
                const tipo = document.getElementById('relatorio-tipo').value;
                const dias = parseInt(document.getElementById('relatorio-periodo').value);
                
                const dataLimite = new Date();
                dataLimite.setDate(dataLimite.getDate() - dias);

                let movimentacoes = this.db.movements.filter(m => new Date(m.date) >= dataLimite);
                
                if (tipo === 'entradas') {
                    movimentacoes = movimentacoes.filter(m => m.type === 'entrada');
                } else if (tipo === 'saidas') {
                    movimentacoes = movimentacoes.filter(m => m.type === 'saida');
                }

                let html = '<h4>Resultado:</h4><ul style="list-style:none; margin-top:10px;">';

                if (tipo === 'consumo-setor') {
                    const consumoPorSetor = {};
                    movimentacoes.filter(m => m.type === 'saida').forEach(m => {
                        consumoPorSetor[m.sector] = (consumoPorSetor[m.sector] || 0) + m.qtd;
                    });
                    
                    Object.entries(consumoPorSetor)
                        .sort((a, b) => b[1] - a[1])
                        .forEach(([setor, total]) => {
                            html += `<li style="margin-bottom:10px;">${setor}: ${total} itens</li>`;
                        });
                } else if (tipo === 'mais-utilizados') {
                    const usoItens = {};
                    movimentacoes.filter(m => m.type === 'saida').forEach(m => {
                        usoItens[m.productId] = (usoItens[m.productId] || 0) + m.qtd;
                    });
                    
                    const topItens = Object.entries(usoItens)
                        .map(([productId, total]) => {
                            const product = this.db.products.find(p => p.id === parseInt(productId));
                            return { name: product?.name || 'Desconhecido', total };
                        })
                        .sort((a, b) => b.total - a.total)
                        .slice(0, 5);

                    topItens.forEach(item => {
                        html += `<li style="margin-bottom:10px;">${item.name}: ${item.total} unidades</li>`;
                    });
                } else {
                    movimentacoes.slice(0, 10).forEach(m => {
                        const product = this.db.products.find(p => p.id === m.productId);
                        html += `<li style="margin-bottom:10px;">${m.type === 'entrada' ? '📥' : '📤'} ${product?.name} - ${m.qtd} un (${new Date(m.date).toLocaleDateString()})</li>`;
                    });
                }

                if (movimentacoes.length === 0) {
                    html += '<li>Nenhuma movimentação no período</li>';
                }

                html += '</ul>';
                document.getElementById('relatorio-resultado').innerHTML = html;
            },

            setupEventListeners: function() {
                // Fechar modais clicando fora
                document.querySelectorAll('.modal-overlay').forEach(modal => {
                    modal.addEventListener('click', function(e) {
                        if (e.target === this) {
                            this.classList.remove('active');
                        }
                    });
                });
            }
        };

        // Inicializar app
        window.onload = () => app.init();
    </script>
</body>
</html>
